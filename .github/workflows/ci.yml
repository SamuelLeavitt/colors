name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: COP4331
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli

      - name: Install dependencies
        run: npm install

      - name: Set up database
        run: |
          mysql -h 127.0.0.1 -uroot -proot COP4331 <<'SQL'
          CREATE USER IF NOT EXISTS 'TheBeast'@'%' IDENTIFIED BY 'WeLoveCOP4331';
          GRANT ALL PRIVILEGES ON COP4331.* TO 'TheBeast'@'%';
          FLUSH PRIVILEGES;

          CREATE TABLE IF NOT EXISTS Users (
            ID INT NOT NULL AUTO_INCREMENT PRIMARY KEY,
            firstName VARCHAR(50),
            lastName VARCHAR(50),
            Login VARCHAR(50),
            Password VARCHAR(50)
          );

          CREATE TABLE IF NOT EXISTS Colors (
            ID INT NOT NULL AUTO_INCREMENT PRIMARY KEY,
            UserId INT,
            Name VARCHAR(50)
          );

          INSERT INTO Users (firstName, lastName, Login, Password)
          VALUES ('Test', 'User', 'testuser', 'testpass');
          SQL

      - name: Run tests
        run: npm test
